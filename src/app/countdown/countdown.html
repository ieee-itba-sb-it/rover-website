<div class="countdown-wrapper">
  <div class="label">
    <p> Cuenta regresiva para la competencia: </p>
  </div>
  <div class="grid">
    <div class="unit"><span>{{ days() }}</span><p>DÍAS</p></div>
    <div class="unit"><span>{{ hours() }}</span><p>HORAS</p></div>
    <div class="unit"><span>{{ minutes() }}</span><p>MINUTOS</p></div>
    <div class="unit"><span>{{ seconds() }}</span><p>SEGUNDOS</p></div>
  </div>
</div>
