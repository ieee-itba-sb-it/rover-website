<section class="hero">
  <div class="overlay">
    <div class="hero-content">
      <h1>{{ title() }}</h1>
      <p>{{ subtitle() }}</p>
      <button>Conocé más</button> <!-- // aca queremos que el boton nos lleve a la seccion info (abajo)  !-->
    </div>
  </div>
</section>

<section class="info">
  <h2>Sobre el proyecto</h2>
  <p>
    Descripcion del proyecto.
  </p>
</section>

<section class="equipos">
  <h2>Conoce nuestros equipos</h2>
  <div class="cards">
    @for (feature of features(); track feature.title) {
      <article class="card">
        <h3>{{ feature.title }}</h3>
        <p>{{ feature.text }}</p>
      </article>
    }
  </div>
</section>
