<section class="hero">
  <div class="overlay">
    <div class="hero-content">
      <h1>{{ title() }}</h1>
      <p>{{ subtitle() }}</p>
      <button>Conocé más</button> <!-- // aca queremos que el boton nos lleve a la seccion info (abajo)  !-->
    </div>
    <div class="timer-content">
      <app-countdown></app-countdown>
    </div>
  </div>
</section>

<section class="info">
  <h2>Sobre el proyecto</h2>
  <p>
    Descripcion del proyecto.
  </p>
</section>

<section class="robot-features">
  <h2>Nuestras Áreas</h2>

  <app-carousel [items]="features()"></app-carousel>
</section>
