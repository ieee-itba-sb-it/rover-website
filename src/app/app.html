<section class="hero">
  <div class="overlay">

    <!-- Título -->
    <div class="hero-content">
      <h1>{{ title() }}</h1>
    </div>

    <!-- Bloque de Contador (Bajado con margen) -->
    <div class="timer-content">
      <app-countdown></app-countdown>
    </div>

    <!-- Botón (Ahora debajo de todo) -->
    <button type="button" class="btn-main" (click)="infoSection.scrollIntoView({ behavior: 'smooth', block: 'start' })">
      Conocé más
    </button>

  </div>
</section>

<section class="info" id="info-section" #infoSection>
  <h2>Sobre el proyecto</h2>
  <p>
    Descripcion del proyecto.
  </p>
</section>

<section class="robot-features">
  <h2>Nuestras Áreas</h2>

  <app-carousel [items]="features()"></app-carousel>
</section>
