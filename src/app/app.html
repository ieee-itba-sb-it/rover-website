<section class="hero">
  <div class="overlay">
    <div class="hero-content">
      <h1>{{ title() }}</h1>
      <p>{{ subtitle() }}</p>
      <button type="button" (click)="infoSection.scrollIntoView({ behavior: 'smooth', block: 'start' })">Conocé más</button>
    </div>
    <div class="timer-content">
      <app-countdown></app-countdown>
    </div>
  </div>
</section>

<section class="info" id="info-section" #infoSection>
  <h2>Sobre el proyecto</h2>
  <p>
    Descripcion del proyecto.
  </p>
</section>

<section class="vision-banner">
  <div class="vision-content">
    <p class="vision-label">Visión o mas info?</p>

    <h2>
      "lorem ipsum bla bla bla bla bla"
    </h2>
  </div>
</section>

<section class="robot-features">
  <h2>Nuestras Áreas</h2>

  <app-carousel [items]="features()"></app-carousel>
</section>
