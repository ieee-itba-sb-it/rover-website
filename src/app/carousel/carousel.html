<p-carousel
  [value]="items()"
  [numVisible]="3"
  [numScroll]="1"
  [circular]="true"
  [responsiveOptions]="responsiveOptions"
  autoplayInterval="3000">

  <ng-template pTemplate="item" let-feature>
    <div class="feature-card">
      <h4 class="feature-title">{{ feature.title }}</h4>
      <p class="feature-text">{{ feature.text }}</p>
    </div>
  </ng-template>
</p-carousel>
